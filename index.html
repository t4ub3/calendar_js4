<!doctype html>
<html class="full-height">
  <head>
    <meta charset="UTF-8" />
    <title>Kalender 2026</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts/utils/date-utils.js" defer></script>
    <script src="scripts/background.js" defer></script>
    <script src="scripts/custom-tags/custom-card.js" defer></script>
    <script src="scripts/darkmode.js" defer></script>
    <script src="scripts/holidays.js" defer></script>
    <script src="scripts/events-api.js" defer></script>
    <script src="scripts/calendar.js" defer></script>
    <script src="main.js" defer></script>
  </head>

  <body class="full-height" id="holds-background" darkmode="on">
    <div class="invisible"></div>
    <div class="full-height">
      <canvas id="background-canvas" class="background-canvas"></canvas>
      <header class="header fixed">
        <h1 class="header__title">Kalender 2026</h1>
      </header>
      <div class="main-layout">
        <custom-card card-title="Über den heutigen Tag" id="card-about-today">
          <ul class="card__list">
            <li>
              Heute ist
              <span
                ><span name="current-weekday"></span>, der
                <span id="full-date"></span></span
              >. Es ist der <span id="number-of-weekday"></span>.
              <span name="current-weekday"></span> im Monat
              <span id="current-month"></span>.
            </li>
            <li>
              <span class="card__text--light" id="today-day-in-month">11</span>
              ist <span id="prime-or-not"></span> Primzahl
            </li>
            <li>
              Mehr als
              <span class="card__text--light" id="now-ms-utc">5</span>ms sind
              seit dem 01.01.1970 vergangen
            </li>
          </ul>
        </custom-card>
        <custom-card card-title="" id="card-calendar-sheet">
          <div class="cal-monthly">
            <ul class="cal-monthly__header">
              <li class="cal-monthly__week-nr">KW</li>
              <li>Mo</li>
              <li>Di</li>
              <li>Mi</li>
              <li>Do</li>
              <li>Fr</li>
              <li>Sa</li>
              <li>So</li>
            </ul>
            <ol id="cal-sheet-cells" class="cal-monthly__day-grid"></ol>
          </div>
        </custom-card>
        <custom-card card-title="Historische Ereignisse" id="events-historic">
            <div id="events-historic-content"></div>
        </custom-card>
        <custom-card card-title="Geburtstage" id="events-births">
            <div id="events-birthdays-content"></div>
        </custom-card>
        <custom-card card-title="Todestage" id="events-deaths">
            <div id="events-deaths-content"></div>
        </custom-card>
        <custom-card card-title="Feiertage" id="holiday-card">
            <div id="holiday-card-content"></div>
        </custom-card>
      </div>
      <footer class="footer fixed">
        <button id="theme-toggle" class="mode-toggle">
          <span>
            <img
              src="assets/icons/light_mode_24dp_F2C94C_FILL0_wght400_GRAD0_opsz24.svg"
            />
            <img
              src="assets/icons/dark_mode_24dp_DCE1E5_FILL0_wght400_GRAD0_opsz24.svg"
            />
          </span>
        </button>
        <div>© Jonas Neumann, cdemy GmbH, 2026</div>
      </footer>
    </div>
  </body>
</html>
